<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IAS Machine Quiz — CSC 2111</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --accent3: #a8ff3e;
    --text: #e8edf5;
    --text-dim: #7a8899;
    --correct: #a8ff3e;
    --wrong: #ff4757;
    --border: rgba(0,229,255,0.15);
    --glow: 0 0 20px rgba(0,229,255,0.3);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background grid */
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index:0;
    pointer-events:none;
  }

  .container {
    max-width: 820px;
    margin: 0 auto;
    padding: 20px;
    position:relative; z-index:1;
  }

  /* ── HEADER ── */
  header {
    text-align:center;
    padding: 40px 0 30px;
    position:relative;
  }
  .tag {
    display:inline-block;
    font-family:'Space Mono', monospace;
    font-size:10px;
    letter-spacing:3px;
    color: var(--accent);
    border:1px solid var(--accent);
    padding:4px 12px;
    margin-bottom:16px;
    text-transform:uppercase;
  }
  h1 {
    font-size: clamp(28px,5vw,48px);
    font-weight:800;
    line-height:1.1;
    letter-spacing:-1px;
  }
  h1 span { color: var(--accent); }
  .subtitle {
    margin-top:8px;
    color: var(--text-dim);
    font-family:'Space Mono',monospace;
    font-size:12px;
    letter-spacing:1px;
  }

  /* ── STATS BAR ── */
  .stats-bar {
    display:flex; gap:12px;
    margin:24px 0;
    flex-wrap:wrap;
  }
  .stat-pill {
    flex:1; min-width:100px;
    background: var(--surface);
    border:1px solid var(--border);
    border-radius:8px;
    padding:12px 16px;
    text-align:center;
  }
  .stat-pill .val {
    font-family:'Space Mono',monospace;
    font-size:22px;
    font-weight:700;
    color: var(--accent);
  }
  .stat-pill .lbl {
    font-size:10px;
    color: var(--text-dim);
    text-transform:uppercase;
    letter-spacing:1px;
    margin-top:2px;
  }

  /* ── PROGRESS ── */
  .progress-wrap {
    background: var(--surface);
    border-radius:4px;
    height:6px;
    margin-bottom:28px;
    overflow:hidden;
  }
  .progress-bar {
    height:100%;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius:4px;
    transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
    box-shadow: var(--glow);
  }

  /* ── FILTER TABS ── */
  .filter-wrap {
    display:flex; gap:8px; flex-wrap:wrap;
    margin-bottom:24px;
  }
  .filter-btn {
    font-family:'Space Mono',monospace;
    font-size:10px;
    letter-spacing:1px;
    text-transform:uppercase;
    padding:6px 14px;
    border:1px solid var(--border);
    background:transparent;
    color: var(--text-dim);
    border-radius:4px;
    cursor:pointer;
    transition:all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,255,0.05);
  }
  .filter-btn.active { font-weight:700; }

  /* ── CARD ── */
  .card {
    background: var(--surface);
    border:1px solid var(--border);
    border-radius:12px;
    padding:28px;
    margin-bottom:16px;
    transition: transform 0.2s, box-shadow 0.2s;
    position:relative;
    overflow:hidden;
    animation: slideIn 0.35s ease both;
  }
  .card::before {
    content:'';
    position:absolute;
    top:0; left:0; right:0;
    height:2px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }
  @keyframes slideIn {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .card:hover { transform:translateY(-2px); box-shadow: var(--glow); }

  .card-meta {
    display:flex; gap:8px; align-items:center;
    margin-bottom:12px; flex-wrap:wrap;
  }
  .badge {
    font-family:'Space Mono',monospace;
    font-size:9px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    padding:3px 8px;
    border-radius:3px;
    font-weight:700;
  }
  .badge-source { background:rgba(0,229,255,0.1); color:var(--accent); }
  .badge-marks  { background:rgba(255,107,53,0.1); color:var(--accent2); }
  .badge-topic  { background:rgba(168,255,62,0.1); color:var(--accent3); }
  .q-num {
    font-family:'Space Mono',monospace;
    font-size:11px; color:var(--text-dim);
    margin-left:auto;
  }

  .question-text {
    font-size:15px; line-height:1.65;
    margin-bottom:20px;
    color: var(--text);
  }
  .question-text strong { color: var(--accent2); }

  /* ── ANSWER AREA ── */
  .answer-area { position:relative; }
  .reveal-btn {
    width:100%;
    font-family:'Syne',sans-serif;
    font-size:13px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    padding:14px 20px;
    background: transparent;
    border:1.5px solid var(--accent);
    color: var(--accent);
    border-radius:8px;
    cursor:pointer;
    transition:all 0.2s;
    display:flex; align-items:center; justify-content:center; gap:8px;
  }
  .reveal-btn:hover {
    background: rgba(0,229,255,0.08);
    box-shadow: var(--glow);
    transform:translateY(-1px);
  }
  .reveal-btn .icon { font-size:16px; transition:transform 0.3s; }
  .reveal-btn.open .icon { transform:rotate(180deg); }

  .answer-box {
    display:none;
    margin-top:14px;
    background: var(--surface2);
    border-left:3px solid var(--accent3);
    border-radius:0 8px 8px 0;
    padding:16px 20px;
    font-size:14px;
    line-height:1.7;
    color: var(--text);
    animation: fadeDown 0.3s ease;
  }
  .answer-box.show { display:block; }
  @keyframes fadeDown {
    from { opacity:0; transform:translateY(-8px); }
    to   { opacity:1; transform:translateY(0); }
  }
  .answer-box .a-label {
    font-family:'Space Mono',monospace;
    font-size:10px;
    color:var(--accent3);
    letter-spacing:2px;
    text-transform:uppercase;
    margin-bottom:8px;
    display:block;
  }

  /* ── SELF ASSESSMENT ── */
  .self-assess {
    display:none;
    margin-top:12px;
    gap:8px;
    flex-wrap:wrap;
  }
  .self-assess.show { display:flex; }
  .assess-btn {
    flex:1; min-width:120px;
    font-family:'Space Mono',monospace;
    font-size:10px;
    letter-spacing:1px;
    text-transform:uppercase;
    padding:10px;
    border-radius:6px;
    border:1.5px solid;
    cursor:pointer;
    font-weight:700;
    transition:all 0.15s;
  }
  .assess-got-it {
    border-color:var(--correct);
    color:var(--correct);
    background:rgba(168,255,62,0.05);
  }
  .assess-got-it:hover { background:rgba(168,255,62,0.15); transform:scale(1.02); }
  .assess-review {
    border-color:var(--accent2);
    color:var(--accent2);
    background:rgba(255,107,53,0.05);
  }
  .assess-review:hover { background:rgba(255,107,53,0.15); transform:scale(1.02); }
  .assess-nope {
    border-color:var(--wrong);
    color:var(--wrong);
    background:rgba(255,71,87,0.05);
  }
  .assess-nope:hover { background:rgba(255,71,87,0.15); transform:scale(1.02); }

  /* feedback stamp */
  .stamp {
    display:none;
    position:absolute; top:16px; right:16px;
    font-family:'Space Mono',monospace;
    font-size:11px;
    font-weight:700;
    letter-spacing:2px;
    text-transform:uppercase;
    padding:4px 10px;
    border-radius:4px;
    transform:rotate(3deg);
  }
  .stamp.got-it  { display:block; background:rgba(168,255,62,0.15); color:var(--correct); border:1.5px solid var(--correct); }
  .stamp.review  { display:block; background:rgba(255,107,53,0.15); color:var(--accent2); border:1.5px solid var(--accent2); }
  .stamp.nope    { display:block; background:rgba(255,71,87,0.15);  color:var(--wrong);   border:1.5px solid var(--wrong); }

  /* ── SPECIAL: REGISTER TABLE ── */
  .reg-table-wrap { overflow-x:auto; margin:12px 0; }
  table.reg-table {
    width:100%; border-collapse:collapse;
    font-size:12px; font-family:'Space Mono',monospace;
  }
  table.reg-table th {
    background:rgba(0,229,255,0.1);
    color:var(--accent);
    padding:8px 12px; text-align:left;
    border-bottom:1px solid var(--border);
    font-size:10px; letter-spacing:1px; text-transform:uppercase;
  }
  table.reg-table td {
    padding:8px 12px;
    border-bottom:1px solid var(--border);
    color:var(--text);
    vertical-align:top;
  }
  table.reg-table tr:nth-child(even) td { background:rgba(255,255,255,0.02); }
  .reg-name { color:var(--accent2); font-weight:700; }

  /* ── CODE BLOCKS ── */
  .code-block {
    background:#050810;
    border:1px solid var(--border);
    border-radius:6px;
    padding:14px 16px;
    font-family:'Space Mono',monospace;
    font-size:11.5px;
    line-height:1.8;
    overflow-x:auto;
    margin:8px 0;
    color:#c3d8ff;
  }
  .code-block .op  { color:var(--accent2); font-weight:700; }
  .code-block .addr { color:var(--accent3); }
  .code-block .comment { color:var(--text-dim); }

  /* ── FINAL SCORE ── */
  #score-screen {
    display:none;
    text-align:center;
    padding:60px 20px;
    animation: slideIn 0.5s ease;
  }
  .score-circle {
    width:160px; height:160px;
    border-radius:50%;
    border:4px solid var(--accent);
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    margin:0 auto 24px;
    box-shadow: var(--glow), inset 0 0 40px rgba(0,229,255,0.05);
  }
  .score-pct { font-size:42px; font-weight:800; color:var(--accent); font-family:'Space Mono',monospace; }
  .score-sub { font-size:11px; color:var(--text-dim); letter-spacing:1px; }
  .score-msg { font-size:20px; font-weight:700; margin-bottom:8px; }
  .score-detail { color:var(--text-dim); font-size:13px; margin-bottom:32px; }
  .restart-btn {
    font-family:'Syne',sans-serif;
    font-size:14px; font-weight:700;
    letter-spacing:2px; text-transform:uppercase;
    padding:14px 36px;
    background: var(--accent);
    color: var(--bg);
    border:none; border-radius:8px;
    cursor:pointer;
    transition:all 0.2s;
  }
  .restart-btn:hover { transform:translateY(-2px); box-shadow:var(--glow); }

  /* ── RESPONSIVE ── */
  @media(max-width:600px) {
    .card { padding:18px; }
    h1 { font-size:26px; }
    .stats-bar { gap:8px; }
    .stat-pill .val { font-size:18px; }
  }

  /* scrollbar */
  ::-webkit-scrollbar { width:6px; height:6px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="tag">CSC 2111 · Computer Architecture · UNZA</div>
    <h1>IAS Machine<br><span>Quiz Bank</span></h1>
    <p class="subtitle">Past papers: 2018 · 2024 · 2025 · 2014/15 · Test 1 2015</p>
  </header>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-pill"><div class="val" id="stat-total">0</div><div class="lbl">Total Qs</div></div>
    <div class="stat-pill"><div class="val" id="stat-done" style="color:var(--accent3)">0</div><div class="lbl">Answered</div></div>
    <div class="stat-pill"><div class="val" id="stat-got" style="color:var(--correct)">0</div><div class="lbl">Got It ✓</div></div>
    <div class="stat-pill"><div class="val" id="stat-review" style="color:var(--accent2)">0</div><div class="lbl">Review</div></div>
    <div class="stat-pill"><div class="val" id="stat-nope" style="color:var(--wrong)">0</div><div class="lbl">Need Work</div></div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap"><div class="progress-bar" id="progress-bar" style="width:0%"></div></div>

  <!-- Filters -->
  <div class="filter-wrap">
    <button class="filter-btn active" onclick="filterCards('all')">All Topics</button>
    <button class="filter-btn" onclick="filterCards('registers')">Registers</button>
    <button class="filter-btn" onclick="filterCards('instruction')">Instruction Format</button>
    <button class="filter-btn" onclick="filterCards('fetch-execute')">Fetch-Execute</button>
    <button class="filter-btn" onclick="filterCards('assembly')">Assembly Code</button>
    <button class="filter-btn" onclick="filterCards('calculation')">Calculations</button>
    <button class="filter-btn" onclick="filterCards('truefalse')">True/False</button>
  </div>

  <!-- Quiz Cards -->
  <div id="quiz-container"></div>

  <!-- Score Screen -->
  <div id="score-screen">
    <div class="score-circle">
      <div class="score-pct" id="final-pct">0%</div>
      <div class="score-sub">Got It</div>
    </div>
    <div class="score-msg" id="score-msg">—</div>
    <div class="score-detail" id="score-detail">—</div>
    <button class="restart-btn" onclick="restart()">▶ Restart Quiz</button>
  </div>

</div>

<script>
const questions = [
  // ── REGISTERS ──────────────────────────────────────────────────
  {
    id:1, topic:'registers',
    source:'2024 Final Exam • 6 marks',
    marks:6,
    q:'Name and state the <strong>function</strong> and <strong>size in bits</strong> of each of the seven (7) registers of the IAS machine.',
    a:`<span class="a-label">▶ Answer</span>
      <div class="reg-table-wrap"><table class="reg-table">
        <tr><th>Register</th><th>Full Name</th><th>Size</th><th>Function</th></tr>
        <tr><td class="reg-name">PC</td><td>Program Counter</td><td>12 bits</td><td>Address of the NEXT instruction to fetch</td></tr>
        <tr><td class="reg-name">MAR</td><td>Memory Address Register</td><td>12 bits</td><td>Holds address for current memory access</td></tr>
        <tr><td class="reg-name">MBR</td><td>Memory Buffer Register</td><td>40 bits</td><td>Holds data being transferred to/from memory</td></tr>
        <tr><td class="reg-name">IR</td><td>Instruction Register</td><td>8 bits</td><td>Holds the OPCODE of the current instruction</td></tr>
        <tr><td class="reg-name">IBR</td><td>Instruction Buffer Register</td><td>20 bits</td><td>Temporarily holds the right-hand instruction</td></tr>
        <tr><td class="reg-name">AC</td><td>Accumulator</td><td>40 bits</td><td>Stores arithmetic / logic results</td></tr>
        <tr><td class="reg-name">MQ</td><td>Multiplier-Quotient</td><td>40 bits</td><td>Used in multiply (multiplier) and divide (quotient)</td></tr>
      </table></div>
      <br>🧠 <strong>Memory trick:</strong> Address registers (PC, MAR) = 12 bits. Data registers (MBR, AC, MQ) = 40 bits. IR = 8 bits (opcode). IBR = 20 bits (one instruction).`
  },
  {
    id:2, topic:'registers',
    source:'Conceptual • Core exam',
    marks:4,
    q:'What is the difference between the <strong>MAR</strong> and the <strong>MBR</strong>? Why does the IAS machine need both?',
    a:`<span class="a-label">▶ Answer</span>
      <strong>MAR (Memory Address Register, 12-bit):</strong> Holds the ADDRESS of the memory location to read/write. Connected to the address bus.<br><br>
      <strong>MBR (Memory Buffer Register, 40-bit):</strong> Holds the actual DATA being transferred (the full 40-bit word).<br><br>
      You need both because memory access requires specifying <em>WHERE</em> (MAR) and <em>WHAT data</em> (MBR) — two separate pieces of information.`
  },
  {
    id:3, topic:'registers',
    source:'Conceptual',
    marks:3,
    q:'Why is the <strong>IBR (Instruction Buffer Register)</strong> needed in the IAS machine? What problem does it solve?',
    a:`<span class="a-label">▶ Answer</span>
      An IAS memory word holds <strong>TWO instructions</strong> (40 bits = left 20 + right 20).<br><br>
      When the CPU fetches a word, it executes the LEFT instruction immediately (loaded to IR).<br>
      The RIGHT instruction is stored in the IBR temporarily.<br><br>
      Next cycle → CPU takes instruction from IBR instead of fetching from memory again.<br><br>
      <strong>Benefit:</strong> Cuts memory accesses in half — two instructions per fetch.`
  },
  {
    id:4, topic:'registers',
    source:'True/False',
    marks:2,
    q:'<strong>True or False:</strong> The PC register in the IAS machine is 40 bits wide. Justify your answer.',
    a:`<span class="a-label">▶ Answer</span>
      <strong>FALSE.</strong><br><br>
      PC is <strong>12 bits</strong>, matching the size of the address field in an IAS instruction.<br>
      12 bits → can address 2<sup>12</sup> = 4096 memory locations.<br>
      40-bit registers are the DATA registers (AC, MBR, MQ) — not address registers.`
  },

  // ── INSTRUCTION FORMAT ──────────────────────────────────────────
  {
    id:5, topic:'instruction',
    source:'Core knowledge',
    marks:3,
    q:'How many bits are in: (a) one IAS instruction, (b) one IAS memory word, (c) the opcode field, (d) the address field?',
    a:`<span class="a-label">▶ Answer</span>
      (a) One IAS instruction = <strong>20 bits</strong><br>
      (b) One IAS memory word = <strong>40 bits</strong> (holds 2 instructions)<br>
      (c) Opcode field = <strong>8 bits</strong> → allows 2<sup>8</sup> = 256 different operations<br>
      (d) Address field = <strong>12 bits</strong> → addresses 2<sup>12</sup> = 4096 memory locations<br><br>
      Word layout: [ Left Opcode 8-bit | Left Address 12-bit | Right Opcode 8-bit | Right Address 12-bit ]`
  },
  {
    id:6, topic:'instruction',
    source:'Calculation',
    marks:4,
    q:'An IAS instruction has opcode <strong>5</strong> (decimal) and address <strong>0x1A3</strong> (hex). Write the full 20-bit binary instruction and express it in hexadecimal.',
    a:`<span class="a-label">▶ Answer</span>
      <strong>Step 1:</strong> Opcode 5 → binary (8-bit): <code>00000101</code><br>
      <strong>Step 2:</strong> Address 0x1A3 = 1×256 + 10×16 + 3 = 419 decimal → binary (12-bit): <code>000110100011</code><br>
      <strong>Step 3:</strong> Full 20-bit instruction: <code>00000101 000110100011</code><br>
      <strong>Step 4:</strong> Group into 5 nibbles → 0000 | 0101 | 0001 | 1010 | 0011 = <strong>051A3</strong> hex`
  },
  {
    id:7, topic:'instruction',
    source:'2024 Final Exam • 8 marks',
    marks:8,
    q:'Convert the IAS instruction <strong>S(x)->Ac+ n</strong> to machine code in hexadecimal, where n is stored at address <strong>004</strong> (hex). Opcode for S(x)->Ac+ is 1.',
    a:`<span class="a-label">▶ Answer</span>
      <strong>Opcode:</strong> 1 decimal = <code>00000001</code> (8-bit binary)<br>
      <strong>Address:</strong> 004 hex = 4 decimal = <code>000000000100</code> (12-bit binary)<br>
      <strong>Full 20-bit:</strong> <code>00000001 000000000100</code><br>
      <strong>In hex (5 digits):</strong> 0000 | 0001 | 0000 | 0000 | 0100 = <strong>01 004</strong><br><br>
      ✅ This matches the 2024 exam sample answer exactly!`
  },
  {
    id:8, topic:'instruction',
    source:'2018 Final Exam Q3',
    marks:4,
    q:'A 16-bit IAS-style machine uses 4-bit opcodes and 12-bit addresses. How many unique opcodes can it support? How many addressable memory locations?',
    a:`<span class="a-label">▶ Answer</span>
      <strong>Opcodes:</strong> 4 bits → 2<sup>4</sup> = <strong>16 unique opcodes</strong><br>
      <strong>Addresses:</strong> 12 bits → 2<sup>12</sup> = <strong>4096 addressable locations</strong><br><br>
      For reference — standard IAS uses 8-bit opcode (256 opcodes) and 12-bit address (4096 locations).`
  },
  {
    id:9, topic:'instruction',
    source:'True/False',
    marks:2,
    q:'<strong>True or False:</strong> Opcode 17 (At->S(x)) adds the contents of memory[x] to the AC.',
    a:`<span class="a-label">▶ Answer</span>
      <strong>FALSE.</strong><br><br>
      At->S(x) does the <em>opposite</em> — it <strong>STORES</strong> the value in AC <em>to</em> memory location x.<br><br>
      To ADD memory[x] to AC, you use opcode 5: <strong>S(x)->Ah+</strong><br>
      People mix these up constantly in exams — remember: "At" = "AC to memory".`
  },

  // ── FETCH-EXECUTE ───────────────────────────────────────────────
  {
    id:10, topic:'fetch-execute',
    source:'2018 Final Exam Q3 • 20 marks',
    marks:20,
    q:'Describe the <strong>exact register transfers</strong> that occur during the <strong>FETCH phase</strong> of the instruction cycle. List each step in order.',
    a:`<span class="a-label">▶ Answer</span>
      <div class="code-block">
        <span class="comment">// FETCH PHASE — same for every instruction</span><br>
        <span class="op">Step 1:</span> MAR <span class="addr">← PC</span>        <span class="comment">// send instruction address to memory</span><br>
        <span class="op">Step 2:</span> MBR <span class="addr">← Memory[MAR]</span> <span class="comment">// load 40-bit word from memory</span><br>
        <span class="op">Step 3:</span> PC  <span class="addr">← PC + 1</span>      <span class="comment">// point to next word (done NOW)</span><br>
        <span class="op">Step 4:</span> IR  <span class="addr">← MBR[0:7]</span>    <span class="comment">// extract left opcode → IR</span><br>
        <span class="op">Step 4b:</span> IBR <span class="addr">← MBR[20:39]</span>  <span class="comment">// buffer right instruction in IBR</span>
      </div>
      The EXECUTE phase then varies depending on what IR (the opcode) says to do.`
  },
  {
    id:11, topic:'fetch-execute',
    source:'Core concept',
    marks:4,
    q:'What is the difference between the <strong>FETCH phase</strong> and the <strong>EXECUTE phase</strong> of the instruction cycle?',
    a:`<span class="a-label">▶ Answer</span>
      <strong>FETCH Phase:</strong> Always the same sequence — retrieve the instruction from memory, load opcode to IR, increment PC. The CPU doesn't know or care WHAT the instruction does yet.<br><br>
      <strong>EXECUTE Phase:</strong> Varies completely based on the opcode. Could involve: reading operand from memory, performing arithmetic in ALU, writing to memory, or I/O. Each opcode triggers a different set of micro-operations.<br><br>
      Think of it like: Fetch = picking up a card. Execute = reading and acting on what the card says.`
  },
  {
    id:12, topic:'fetch-execute',
    source:'Conceptual',
    marks:3,
    q:'During the fetch cycle, when exactly does the PC get incremented — and why does it happen at that point?',
    a:`<span class="a-label">▶ Answer</span>
      PC is incremented <strong>during the fetch phase</strong> (Step 3), right after the word is loaded into MBR — before execution starts.<br><br>
      <strong>Why so early?</strong> Because the current instruction (now in MBR/IR) is being processed, and the CPU needs PC ready to point at the <em>next</em> instruction. If a jump instruction later changes PC, it simply overwrites this incremented value. No harm done.`
  },

      <div class="code-block">

        MAR <span class="addr">= 300</span>   <span class="comment">← from PC</span><br>
        MBR <span class="addr">= word</span>  <span class="comment">← memory[300] fetched</span><br>
        PC  <span class="addr">= 301</span>   <span class="comment">← incremented</span><br>
        IR  <span class="addr">= 0001</span>  <span class="comment">← opcode (load)</span><br>
        <br>
        <span class="comment">// EXECUTE (opcode 1 = Load AC from memory)</span><br>
        MAR <span class="addr">= 939</span>   <span class="comment">← address from instruction</span><br>
        MBR <span class="addr">= 0005</span>  <span class="comment">← memory[939] = 0005</span><br>
        AC  <span class="addr">= 0005</span>  <span class="comment">← AC ← MBR</span>
      </div>`
  },

  // ── ASSEMBLY CODE ───────────────────────────────────────────────
  {
    id:14, topic:'assembly',
    source:'2024 Final Exam • 12 marks',

    q:'Write complete IAS assembly code for: <strong>n = n + m</strong>, then <strong>z = z - y</strong>, then <strong>n * z</strong>. Data: n=3, m=4, z=5, y=2.',

      <div class="code-block">
        <span class="comment">; Compute n = n + m</span><br>
        <span class="op">S(x)->Ac+</span> <span class="addr">n</span>      <span class="comment">; load n into AC</span><br>
        <span class="op">S(x)->Ah+</span> <span class="addr">m</span>      <span class="comment">; AC = n + m</span><br>
        <span class="op">At->S(x)</span>  <span class="addr">n</span>      <span class="comment">; store result → n</span><br>
        <br>
        <span class="comment">; Compute z = z - y</span><br>
        <span class="op">S(x)->Ac+</span> <span class="addr">z</span>      <span class="comment">; load z into AC</span><br>
        <span class="op">S(x)->Ah-</span> <span class="addr">y</span>      <span class="comment">; AC = z - y</span><br>
        <span class="op">At->S(x)</span>  <span class="addr">z</span>      <span class="comment">; store result → z</span><br>
        <br>
        <span class="comment">; Compute n * z</span><br>
        <span class="op">S(x)->R</span>   <span class="addr">z</span>      <span class="comment">; load z into MQ</span><br>
        <span class="op">S(x)*R->A</span> <span class="addr">n</span>      <span class="comment">; AC(left) = n×MQ, MQ(right) = remainder</span><br>
        <br>
        <span class="comment">; Data section</span><br>
        n .data 3 | m .data 4 | z .data 5 | y .data 2
      </div>`

        <tr><td>1</td><td>S(x)->Ah+ m</td></tr>
        <tr><td>2</td><td>At->S(x) n</td></tr>
        <tr><td>3</td><td>S(x)->Ac+ z</td></tr>
        <tr><td>4</td><td>S(x)->Ah- y</td></tr>
        <tr><td>5</td><td>At->S(x) z</td></tr>
        <tr><td>6</td><td>S(x)->R z</td></tr>
        <tr><td>7</td><td>S(x)*R->A n</td></tr>
        <tr><td>8</td><td>n .data 3</td></tr>
        <tr><td>9</td><td>m .data 4</td></tr>

        <tr><td>11</td><td>y .data 2</td></tr>

  },
  {
    id:16, topic:'assembly',
    source:'2025 Final Exam • 5 marks',
    marks:5,
    q:'The 2025 exam program uses <strong>Ap->S(x)</strong> (opcode 18) inside a loop. What does this instruction do, and why is it used here?',
    a:`<span class="a-label">▶ Answer</span>
      <strong>Ap->S(x)</strong> replaces the right-hand 12-bit ADDRESS field of the instruction stored at memory location x, using the right-hand 12 bits of AC.<br><br>
      This is called <strong>self-modifying code</strong> — the program changes its own instructions while running.<br><br>
      <strong>Why use it in the 2025 loop?</strong> The loop stores computed values into different memory locations each iteration. Instead of having a fixed store address, Ap->S(x) updates the destination address dynamically.<br><br>
      💡 Only IAS-style machines can do this directly — modern CPUs strongly discourage self-modification!`
  },
  {
    id:17, topic:'assembly',
    source:'Instruction set knowledge',
    marks:3,
    q:'What is the difference between <strong>opcode 13 (Cu->S(x))</strong> and <strong>opcode 15 (Cc->S(x))</strong>?',
    a:`<span class="a-label">▶ Answer</span>
      <strong>Opcode 13 — Cu->S(x) (Unconditional Jump):</strong><br>
      Always jumps to the LEFT instruction at address x. No conditions — PC is set to x regardless.<br><br>
      <strong>Opcode 15 — Cc->S(x) (Conditional Jump):</strong><br>
      Jumps to LEFT instruction at x ONLY IF <strong>AC ≥ 0</strong>. If AC < 0, continues normally (next instruction).<br><br>
      This is how the IAS machine implements <em>if-statements</em> and conditional loops.`
  },

  {

      941 ÷ 16 = 58 remainder <strong>13 → D</strong><br>
      58 ÷ 16 = 3 remainder <strong>10 → A</strong><br>
      3 ÷ 16 = 0 remainder <strong>3 → 3</strong><br><br>
      Read remainders bottom-up: <strong>3AD</strong><br><br>
      ✅ Check: 3×256 + 10×16 + 13 = 768 + 160 + 13 = 941 ✓`

    a:`<span class="a-label">▶ Answer</span>
      <strong>(a) Opcode:</strong> 00000101 binary = <strong>5 decimal</strong><br>
      <strong>(b) Address:</strong> 000000010100 binary = 16+4 = <strong>20 decimal</strong><br>
      <strong>(c) Address in hex:</strong> 20 decimal = <strong>014 hex</strong><br>
      <strong>(d) Instruction:</strong> Opcode 5 = <strong>S(x)->Ah+</strong> (Add memory[20] to AC)`

  {
    id:21, topic:'truefalse',
    source:'True/False',

    q:'<strong>True or False:</strong> The IAS machine can store more than one instruction per memory word. Justify.',
    a:`<span class="a-label">▶ Answer</span>
      <strong>TRUE.</strong><br><br>
      Each 40-bit memory word holds <strong>TWO 20-bit instructions</strong> — a LEFT instruction and a RIGHT instruction. This is one of the key architectural features of the IAS design.`
  },
  {
    id:22, topic:'truefalse',
    source:'True/False',
    marks:2,
    q:'<strong>True or False:</strong> An unconditional jump instruction (opcode 13) will always change the value in the PC.',
    a:`<span class="a-label">▶ Answer</span>
      <strong>TRUE.</strong><br><br>
      Cu->S(x) sets PC = x unconditionally. There is no condition checked. This is exactly what makes it "unconditional" — it always redirects execution to address x.`
  },
  {
    id:23, topic:'truefalse',
    source:'True/False',
    marks:2,
    q:'<strong>True or False:</strong> The MBR holds the opcode of the currently executing instruction.',
    a:`<span class="a-label">▶ Answer</span>
      <strong>FALSE.</strong><br><br>
      The <strong>IR (Instruction Register)</strong> holds the opcode of the current instruction.<br>
      The MBR is a <em>transit buffer</em> — it temporarily holds data being moved between the CPU and memory. After the instruction is fetched into MBR, the opcode is extracted into IR.`
  },
  {
    id:24, topic:'truefalse',
    source:'True/False',
    marks:2,

    a:`<span class="a-label">▶ Answer</span>
      <strong>FALSE.</strong><br><br>
      Multiply requires a two-step process:<br>
      <strong>Step 1:</strong> Load one operand into MQ using opcode 9: S(x)->R<br>
      <strong>Step 2:</strong> Execute opcode 11: S(x)*R->A (multiplies memory[x] × MQ)<br><br>
      Result: left half (high bits) in AC, right half (low bits) in MQ.`
  },
];

// ── STATE ──────────────────────────────────────────────────────────
let scores = {}; // id → 'got-it' | 'review' | 'nope'
let currentFilter = 'all';

function init() {
  renderCards(questions);
  updateStats();
}

function renderCards(qs) {
  const container = document.getElementById('quiz-container');
  container.innerHTML = '';
  qs.forEach((q, i) => {
    const div = document.createElement('div');
    div.className = 'card';
    div.id = `card-${q.id}`;
    div.style.animationDelay = `${i * 0.04}s`;

    const stamp = scores[q.id] ? `<div class="stamp ${scores[q.id]}">${scores[q.id] === 'got-it' ? '✓ Got It' : scores[q.id] === 'review' ? '~ Review' : '✗ Redo'}</div>` : '';

    div.innerHTML = `
      ${stamp}
      <div class="card-meta">
        <span class="badge badge-source">${q.source}</span>
        <span class="badge badge-marks">${q.marks} mark${q.marks>1?'s':''}</span>
        <span class="badge badge-topic">${q.topic}</span>
        <span class="q-num">Q${q.id} / ${questions.length}</span>
      </div>
      <div class="question-text">${q.q}</div>
      <div class="answer-area">
        <button class="reveal-btn" id="btn-${q.id}" onclick="toggleAnswer(${q.id})">
          <span class="icon">▼</span> Reveal Answer
        </button>
        <div class="answer-box" id="ans-${q.id}">${q.a}</div>
        <div class="self-assess" id="assess-${q.id}">
          <button class="assess-btn assess-got-it" onclick="mark(${q.id},'got-it')">✓ Got It</button>
          <button class="assess-btn assess-review" onclick="mark(${q.id},'review')">~ Need Review</button>
          <button class="assess-btn assess-nope" onclick="mark(${q.id},'nope')">✗ Start Again</button>
        </div>
      </div>`;
    container.appendChild(div);

    // restore open state
    if (scores[q.id]) {
      document.getElementById(`ans-${q.id}`).classList.add('show');
      document.getElementById(`btn-${q.id}`).classList.add('open');
      document.getElementById(`assess-${q.id}`).classList.add('show');
    }
  });
  document.getElementById('stat-total').textContent = qs.length;
}

function toggleAnswer(id) {
  const box = document.getElementById(`ans-${id}`);
  const btn = document.getElementById(`btn-${id}`);
  const assess = document.getElementById(`assess-${id}`);
  const open = box.classList.toggle('show');
  btn.classList.toggle('open', open);
  assess.classList.toggle('show', open);
}

function mark(id, rating) {
  scores[id] = rating;
  const card = document.getElementById(`card-${id}`);
  // update stamp
  let existingStamp = card.querySelector('.stamp');
  if (existingStamp) existingStamp.remove();
  const stamp = document.createElement('div');
  stamp.className = `stamp ${rating}`;
  stamp.textContent = rating === 'got-it' ? '✓ Got It' : rating === 'review' ? '~ Review' : '✗ Redo';
  card.prepend(stamp);
  updateStats();
  checkComplete();
}

function updateStats() {
  const answeredIds = Object.keys(scores).map(Number);
  const filtered = currentFilter === 'all' ? questions : questions.filter(q => q.topic === currentFilter);
  const filteredIds = filtered.map(q => q.id);

  const done   = answeredIds.filter(id => filteredIds.includes(id)).length;
  const got    = answeredIds.filter(id => filteredIds.includes(id) && scores[id] === 'got-it').length;
  const review = answeredIds.filter(id => filteredIds.includes(id) && scores[id] === 'review').length;
  const nope   = answeredIds.filter(id => filteredIds.includes(id) && scores[id] === 'nope').length;

  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-got').textContent  = got;
  document.getElementById('stat-review').textContent = review;
  document.getElementById('stat-nope').textContent = nope;

  const pct = filtered.length > 0 ? (done / filtered.length) * 100 : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
}

function checkComplete() {
  const allAnswered = questions.every(q => scores[q.id]);
  if (allAnswered) showScore();
}

function showScore() {
  const total = questions.length;
  const got   = Object.values(scores).filter(s => s === 'got-it').length;
  const pct   = Math.round((got / total) * 100);

  document.getElementById('final-pct').textContent = pct + '%';

  let msg, detail;
  if (pct >= 80) {
    msg = "🔥 IAS Machine? Mastered.";
    detail = `${got}/${total} questions nailed. You're ready for that test.`;
  } else if (pct >= 60) {
    msg = "💪 Solid foundation — tighten it up.";
    detail = `${got}/${total} correct. Review the orange cards, then go again.`;
  } else if (pct >= 40) {
    msg = "📚 Getting there — but more work needed.";
    detail = `${got}/${total} correct. Focus on registers and fetch-execute first.`;
  } else {
    msg = "🧠 The IAS machine isn't going anywhere — revisit and try again.";
    detail = `${got}/${total} correct. Start with Section 1 (registers) — that's the foundation.`;
  }

  document.getElementById('score-msg').textContent = msg;
  document.getElementById('score-detail').textContent = detail;
  document.getElementById('quiz-container').style.display = 'none';
  document.getElementById('score-screen').style.display = 'block';
}

function filterCards(topic) {
  currentFilter = topic;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const filtered = topic === 'all' ? questions : questions.filter(q => q.topic === topic);
  renderCards(filtered);
  updateStats();
}

function restart() {
  scores = {};
  currentFilter = 'all';
  document.getElementById('quiz-container').style.display = 'block';
  document.getElementById('score-screen').style.display = 'none';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('.filter-btn').classList.add('active');
  renderCards(questions);
  updateStats();
}

init();
</script>
